name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read
    actions: write
    pull-requests: write

env:
    CARGO_TERM_COLOR: always

jobs:
    test:
        name: test (${{ matrix.os }}, ${{ matrix.python-version }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt

            - uses: Swatinem/rust-cache@v2

            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Check Rust formatting
              run: make fmt-check-rust

            - name: Rust clippy
              run: make lint-rust

            - name: Rust unit tests
              run: make test-rust

            - name: Install Python deps
              run: make setup

            - name: Python tests
              run: make test-python

    build:
        name: build (${{ matrix.os }})
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Build wheel (abi3-py310)
              run: make wheel

            - uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.os }}
                  path: dist/

    benchmarks:
        name: benchmarks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Download baseline (PR only)
              if: github.event_name == 'pull_request'
              uses: dawidd6/action-download-artifact@v6
              with:
                  branch: main
                  name: benchmark-results
                  path: benchmarks/results
                  if_no_artifact_found: warn

            - name: Run benchmarks
              id: bench
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ] && ls benchmarks/results/Linux-*/ 2>/dev/null; then
                    echo "Comparing against main baseline..."
                    make bench-compare > /tmp/bench-output.txt 2>&1 || true
                    cat /tmp/bench-output.txt
                  else
                    echo "Saving new baseline..."
                    make bench-save
                  fi

            - name: Generate benchmark comment
              if: github.event_name == 'pull_request' && always()
              run: |
                  JSON=$(find benchmarks/results -name "*.json" -not -name ".gitkeep" | sort -r | head -1)
                  if [ -n "$JSON" ]; then
                    uv run python scripts/benchmark_comment.py "$JSON" > /tmp/benchmark-comment.md
                  fi

            - name: Upload benchmark comment artifact
              if: github.event_name == 'pull_request' && always()
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-comment
                  path: /tmp/benchmark-comment.md

            - name: Save baseline (main only)
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-results
                  path: benchmarks/results/

    benchmark-comment:
        name: post benchmark comment
        needs: benchmarks
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download benchmark comment
              uses: actions/download-artifact@v4
              with:
                  name: benchmark-comment
                  path: /tmp

            - name: Post or update PR comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const marker = '<!-- benchmarks:pathlibrs -->';
                      let commentBody = '';
                      try {
                        commentBody = fs.readFileSync('/tmp/benchmark-comment.md', 'utf8').trim();
                      } catch {
                        core.warning('No benchmark comment file found; skipping.');
                        return;
                      }
                      if (!commentBody) {
                        core.warning('Benchmark comment is empty; skipping.');
                        return;
                      }
                      const body = marker + '\n' + commentBody;
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
