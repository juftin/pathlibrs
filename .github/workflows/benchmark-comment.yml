name: Benchmark Comment

on:
    workflow_run:
        workflows: ["CI"]
        types: [completed]

permissions:
    actions: read
    pull-requests: write

jobs:
    comment:
        name: post benchmark comment
        if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download benchmark comment artifact
              uses: dawidd6/action-download-artifact@v6
              with:
                  run_id: ${{ github.event.workflow_run.id }}
                  name: benchmark-comment

            - name: Post or update PR comment
              uses: actions/github-script@v7
              env:
                  BRANCH: ${{ github.event.workflow_run.head_branch }}
              with:
                  script: |
                      const fs = require('fs');
                      const branch = process.env.BRANCH;

                      let prNumber = null;
                      // For fork PRs, workflow_run.pull_requests may be empty.
                      // Fall back: find PR from branch name.
                      if (context.payload.workflow_run.pull_requests?.length > 0) {
                        prNumber = context.payload.workflow_run.pull_requests[0].number;
                      }
                      if (!prNumber) {
                        const { data: prs } = await github.rest.pulls.list({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: 'open',
                          head: `${context.repo.owner}:${branch}`,
                        });
                        if (prs.length > 0) prNumber = prs[0].number;
                      }
                      if (!prNumber) {
                        core.warning('No PR number found; skipping.');
                        return;
                      }

                      const marker = '<!-- benchmarks:pathlibrs -->';
                      let commentBody = '';
                      try {
                        commentBody = fs.readFileSync('benchmark-comment.md', 'utf8').trim();
                      } catch {
                        core.warning('No benchmark comment file found; skipping.');
                        return;
                      }
                      if (!commentBody) {
                        core.warning('Benchmark comment is empty; skipping.');
                        return;
                      }

                      const body = marker + '\n' + commentBody;
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                      });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber,
                          body,
                        });
                      }
